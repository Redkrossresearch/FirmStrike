kind = "web"
previewPath = "/"
title = "Viv Scanner"
version = "1.0.0"
id = "artifacts/viv-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25439

[services.development]
run = "pnpm --filter @workspace/viv-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viv-scanner", "run", "build" ]
publicDir = "artifacts/viv-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25439"
BASE_PATH = "/"
